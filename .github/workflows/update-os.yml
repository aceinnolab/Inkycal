name: Build OS image

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to build into InkycalOS Lite"
        required: true
        default: "main"
        type: choice
        options:
          - dev
          - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-on-arm:
    name: Update OS
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target_branch == 'main' || github.event.inputs.target_branch == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Build Raspberry Pi OS
        uses: pguyot/arm-runner-action@v2
        id: build_image
        env:
          GIT_BRANCH: ${{ github.event.inputs.target_branch }}
          INKY_INITAL_PASSWORD: ${{ secrets.INKY_INITAL_PASSWORD }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          SAMPLE_ICAL_URL: ${{ secrets.SAMPLE_ICAL_URL }}
          TEST_ICAL_URL: ${{ secrets.TEST_ICAL_URL }}
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          TINDIE_API_KEY: ${{ secrets.TINDIE_API_KEY }}
          TINDIE_USERNAME: ${{ secrets.TINDIE_USERNAME }}
        with:
          # Set the base_image to the desired Raspberry Pi OS version - current version: Nov 2025 (Trixie)
          base_image: https://downloads.raspberrypi.com/raspios_lite_armhf/images/raspios_lite_armhf-2026-06-19/2026-06-18-raspios-trixie-armhf-lite.img.xz
          image_additional_mb: 3072 # enlarge free space to 3 GB
          optimize_image: true
          commands: |
            cd /home
            sudo useradd -m -p "$(openssl passwd -1 $INKY_INITAL_PASSWORD)" inky
            sudo usermod -a -G adm,dialout,cdrom,sudo,audio,video,plugdev,games,users,input,netdev,gpio,i2c,spi inky
            sudo su inky
            echo $HOME
            # get kernel info
            uname -srm
            cd /home/inky
            sudo apt-get update -y
            sudo apt-get install git python3-dev python3-setuptools zlib1g-dev libjpeg-dev libffi-dev libopenblas-dev libopenjp2-7 chromium chromium-driver rustc build-essential libssl-dev liblgpio-dev -y

            # installer parity: configure swap on small-memory targets
            sudo mkdir -p /etc/rpi/swap.conf.d
            sudo tee /etc/rpi/swap.conf.d/80-use-swapfile.conf >/dev/null <<'EOF'
            [Main]
            Mechanism=swapfile

            [File]
            FixedSizeMiB=1024
            EOF
            sudo systemctl daemon-reexec || true
            if systemctl list-unit-files | grep -q '^systemd-swap\.service'; then
              sudo systemctl restart systemd-swap || true
            fi

            echo $PWD && ls
            # --depth 1: shallow clone – full history is not needed for the OS image
            git clone --depth 1 https://github.com/aceinnolab/Inkycal
            cd Inkycal
            # in trixie, defaults to python 3.13
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip wheel setuptools --index-url https://www.piwheels.org/simple --extra-index-url https://pypi.org/simple
            pip install -e . --index-url https://www.piwheels.org/simple --extra-index-url https://pypi.org/simple
            pip install -r raspberry_os_requirements.txt --index-url https://www.piwheels.org/simple --extra-index-url https://pypi.org/simple

            #334 & #335. TODO: check if 12.48" stuff is still required
            # git clone https://github.com/WiringPi/WiringPi
            # cd WiringPi
            # ./build
            # cd ..

            # TODO: check if still required
            # specific hacks to get this running on newer kernels, see #387. Special thanks to pbarthelemy
            # wget  https://github.com/aceinnolab/Inkycal/raw/refs/heads/assets/hosting/pcre2-10.44.tar.bz2
            # bzip2 -d pcre2-10.44.tar.bz2
            # tar -xf pcre2-10.44.tar
            # cd pcre2-10.44/
            # ./configure && make && sudo make install && make clean
            # cd ..
            # wget https://github.com/aceinnolab/Inkycal/raw/refs/heads/assets/hosting/swig-4.3.0.tar
            # tar -xf swig-4.3.0.tar
            # cd swig-4.3.0/
            # ./configure && make && sudo make install && make clean
            # cd ..
            # wget https://github.com/aceinnolab/Inkycal/raw/refs/heads/assets/hosting/lg.zip
            # unzip lg.zip
            # cd lg
            # make && sudo make install && make clean
            # cd ..
            # pip install rpi-lgpio
            # hacks section end

            # wget https://raw.githubusercontent.com/aceinnolab/Inkycal/assets/tests/settings.json

            # install deps for 12.48" display
            wget -q https://github.com/aceinnolab/Inkycal/raw/assets/tests/bcm2835-1.71.tar
            tar -xf bcm2835-1.71.tar
            cd bcm2835-1.71/
            sudo ./configure && sudo make && sudo make check && sudo make install
            cd ..
            # cleanup
            rm bcm2835-1.71.tar
            echo $PWD

            # enable SPI - SPI enabled via user-data file in bootfs
            # sudo sed -i s/#dtparam=spi=on/dtparam=spi=on/ /boot/config.txt

            # installer parity: create systemd services instead of crontab
            sudo tee /etc/systemd/system/inkycal.service >/dev/null <<'EOF'
            [Unit]
            Description=Inkycal dashboard service
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=inky
            Group=inky
            WorkingDirectory=/home/inky/Inkycal
            Environment=PYTHONUNBUFFERED=1
            Environment=INKYCAL_LOG_DIR=/home/inky/Inkycal/logs
            Environment=INKYCAL_LOCK_FILE=/tmp/inkycal.lock
            ExecStart=/home/inky/Inkycal/venv/bin/python /home/inky/Inkycal/inky_run.py --mode run
            Restart=on-failure
            RestartSec=20
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/inkycal-webui.service >/dev/null <<'EOF'
            [Unit]
            Description=Inkycal local web UI
            After=network-online.target inkycal.service
            Wants=network-online.target

            [Service]
            Type=simple
            User=inky
            Group=inky
            WorkingDirectory=/home/inky/Inkycal
            Environment=PYTHONUNBUFFERED=1
            Environment=INKYCAL_WEBUI_HOST=127.0.0.1
            Environment=INKYCAL_WEBUI_PORT=8080
            ExecStart=/home/inky/Inkycal/venv/bin/python /home/inky/Inkycal/inky_webui.py
            Restart=always
            RestartSec=15
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable inkycal.service
            sudo systemctl enable inkycal-webui.service

            # fix permissions of Inkycal folder recursively
            sudo chown -R inky:inky /home/inky/Inkycal
            sudo mkdir -p /home/inky/Inkycal/logs /home/inky/Inkycal/tmp /home/inky/Inkycal/inkycal/tmp
            sudo chown -R inky:inky /home/inky/Inkycal/logs /home/inky/Inkycal/tmp /home/inky/Inkycal/inkycal/tmp

            # allow some time to unmount
            sleep 10

      - name: Compress the release image
        run: |
          mv ${{ steps.build_image.outputs.image }} InkycalOS_Lite.img
          # -3: reasonable speed/size trade-off; -T0: use all available CPU cores
          xz -3 -T0 -v InkycalOS_Lite.img

      - name: Get latest release version
        run: |
          tag="$(curl -fsSL https://api.github.com/repos/aceinnolab/Inkycal/releases/latest | jq -r '.tag_name')"
          echo "version=${tag}" >> "$GITHUB_ENV"

      - name: Upload Raspberry Pi OS Image
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.version }}
          files: InkycalOS_Lite.img.xz
